name: 💼 Corporate Sponsorship
description: Express interest in sponsoring the development of Agnetic Core.
labels: ["sponsorship", "corporate"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in supporting Agnetic Core! Please provide a few details so we can start the conversation.
  - type: input
    id: organization
    attributes:
      label: Organization Name
      placeholder: "e.g. AI Tech Corp"
    validations:
      required: true
  - type: input
    id: contact_email
    attributes:
      label: Work Email
      placeholder: "name@company.com"
    validations:
      required: true
  - type: textarea
    id: interest
    attributes:
      label: How would you like to support?
      placeholder: "Financial sponsorship, contributing engineering resources, providing hardware/compute, etc."
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Your Goals
      placeholder: "Tell us a bit about what your organization is building and why Agnetic Core interests you."